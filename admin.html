<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Dashboard - ระบบจัดการงานซ่อม</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000080">
    
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* ... CSS เดิมของคุณ ... */
        :root { --primary: #000080; --bg: #f0f2f5; --white: #ffffff; --text: #333333; }
        * { box-sizing: border-box; font-family: 'Prompt', sans-serif; }
        body { 
            background-color: var(--bg); 
            margin: 0; 
            padding: 15px; 
            color: var(--text);
            /* เพิ่มเพื่อให้ iOS ลากลงได้ลื่นไหลขึ้น */
            overscroll-behavior-y: contain; 
        }
        .container { width: 100%; max-width: 500px; margin: 0 auto; }
        .header { background: var(--primary); color: white; padding: 25px 20px; border-radius: 18px; margin-bottom: 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header h2 { margin: 0; font-size: 20px; font-weight: 600; }
        .header p { margin: 5px 0 0; font-size: 13px; opacity: 0.8; }
        #filterArea { display: none; background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; align-items: center; gap: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        #filterArea label { font-size: 14px; font-weight: 600; color: var(--primary); }
        #prefixFilter { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #ddd; font-size: 14px; outline: none; }
        .job-card { background: var(--white); border-radius: 18px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.06); margin-bottom: 20px; border: 1px solid #e0e0e0; transition: transform 0.2s; position: relative; }
        .card-header { padding: 12px 18px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f0f0f0; }
        .ticket-id { font-weight: 600; color: var(--primary); font-size: 15px; }
        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .badge-pending { background: #eef3ff; color: #000080; }
        .badge-process { background: #fff4e6; color: #d9480f; }
        .badge-done { background: #ebfbee; color: #2b8a3e; }
        .card-body { padding: 18px; position: relative; }
        .job-issue { font-size: 16px; font-weight: 600; color: #222; margin-bottom: 12px; display: block; }
        .info-grid { display: flex; flex-direction: column; gap: 8px; }
        .info-row { display: flex; font-size: 13px; line-height: 1.4; }
        .info-label { flex: 2; color: #888; }
        .info-value { flex: 5; color: #444; font-weight: 400; }
        .info-value.admin { color: var(--primary); font-weight: 600; }
        .action-box { margin-top: 15px; padding-top: 15px; border-top: 1px solid #f0f0f0; }
        .action-select { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #eee; background: #fafafa; font-size: 14px; font-weight: 600; color: var(--primary); outline: none; cursor: pointer; }
        .prio-ด่วนที่สุด { border-left: 6px solid #ff4d4d; }
        .prio-ด่วน { border-left: 6px solid #ffa500; }
        .prio-ปกติ { border-left: 6px solid #2ecc71; }
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- เพิ่ม CSS สำหรับ Pull to Refresh --- */
        #pullToRefresh {
            display: none;
            text-align: center;
            padding: 15px;
            font-size: 14px;
            color: var(--primary);
            font-weight: 600;
            background: transparent;
        }
    </style>
</head>
<body>
<div id="pullToRefresh">⬇️ ลากลงเพื่อรีเฟรชข้อมูล...</div>

<button onclick="enableNotificationForIOS()" style="position:fixed; bottom:20px; right:20px; padding:10px; background:blue; color:white; border-radius:50%; z-index:999;">
  🔔
</button>
<div id="loading"><div class="spinner"></div><p id="loadingText">กำลังตรวจสอบสิทธิ์...</p></div>

<div class="container">
    <div class="header">
        <h2>Dashboard จัดการงานซ่อม</h2>
        <p id="adminName">Loading...</p>
    </div>

    <div id="filterArea">
        <label>⚙️ แผนก:</label>
        <select id="prefixFilter" onchange="filterJobs()"><option value="ALL">แสดงทั้งหมด</option></select>
    </div>

    <div id="jobContainer"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-messaging-compat.js"></script>

<script>
    // 1. Firebase Configuration (คงเดิม)
    const firebaseConfig = {
      apiKey: "AIzaSyC1mBineUmQQddHGi539OoYkar_FpL5HOs",
      authDomain: "supnurpsu-9dcb3.firebaseapp.com",
      projectId: "supnurpsu-9dcb3",
      storageBucket: "supnurpsu-9dcb3.firebasestorage.app",
      messagingSenderId: "626588467857",
      appId: "1:626588467857:web:85d8218fa31b8b4f69f530"
    };
    
    firebase.initializeApp(firebaseConfig);
    const messaging = firebase.messaging();

    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwMDUnd9cXi1XTy9NZ-Awi29gxMoW3yd7wOKV10fLXzKP3gHlCowdnJzN7lACXNdLCY/exec";
    const LIFF_ID = "2008875334-VPUmuC8D";

    let allJobs = [];
    let currentAdminUid = "";
    let adminDept = "";

    // --- เพิ่มระบบ Pull-to-Refresh Logic ---
    let touchStartPoint = 0;
    const ptrDiv = document.getElementById('pullToRefresh');

    window.addEventListener('touchstart', (e) => {
        touchStartPoint = e.touches[0].pageY;
    }, { passive: true });

    window.addEventListener('touchmove', (e) => {
        const touchMovePoint = e.touches[0].pageY;
        const distance = touchMovePoint - touchStartPoint;
        if (window.scrollY === 0 && distance > 50) {
            ptrDiv.style.display = 'block';
            ptrDiv.innerText = distance > 100 ? "🔄 ปล่อยนิ้วเพื่อรีเฟรช..." : "⬇️ ลากลงเพื่อรีเฟรช...";
        }
    }, { passive: true });

    window.addEventListener('touchend', async (e) => {
        const touchEndPoint = e.changedTouches[0].pageY;
        const distance = touchEndPoint - touchStartPoint;
        if (window.scrollY === 0 && distance > 100) {
            ptrDiv.innerText = "⏳ กำลังอัปเดต...";
            await loadJobs();
        }
        ptrDiv.style.display = 'none';
    }, { passive: true });

    // --- เพิ่ม Auto-Refresh เมื่อหน้าจอกลับมา Active (iOS Resume) ---
    document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible' && currentAdminUid) {
            console.log('App resumed: Refreshing data...');
            loadJobs();
        }
    });

    async function main() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) { liff.login(); return; }
            const profile = await liff.getProfile();
            currentAdminUid = profile.userId;
            
            const authRes = await fetch(`${WEB_APP_URL}?action=getAdminRole&uid=${currentAdminUid}`);
            const authData = await authRes.json();
            
            if (authData.role === "GUEST") {
                document.body.innerHTML = "<div style='text-align:center; padding:50px;'><h2 style='color:#ff4d4d;'>❌ คุณไม่มีสิทธิ์เข้าถึง</h2><p>กรุณาติดต่อผู้จัดการระบบ</p></div>";
                return;
            }

            adminDept = authData.dept; 
            document.getElementById('adminName').innerText = `👷 ${profile.displayName} | ${adminDept}`;

            if (adminDept.toLowerCase() === "admin") {
                document.getElementById('filterArea').style.display = 'flex';
                await loadPrefixes(); 
            }
            await loadJobs();
        } catch (err) { console.error("Error: " + err.message); }
    }

    async function loadPrefixes() {
        try {
            const res = await fetch(`${WEB_APP_URL}?action=getPrefixes`);
            const prefixes = await res.json();
            const select = document.getElementById('prefixFilter');
            prefixes.forEach(p => {
                const opt = document.createElement('option');
                opt.value = p; opt.innerText = p; select.appendChild(opt);
            });
        } catch (e) { console.error(e); }
    }

    async function loadJobs() {
        // เช็คว่ามี UI Loading โชว์อยู่ไหม ถ้าไม่มี (เช่นกรณี PTR) ให้เปลี่ยน Text เฉยๆ
        const loadingDiv = document.getElementById('loading');
        if (loadingDiv.style.display === 'none') {
            console.log("Background refreshing...");
        } else {
            document.getElementById('loadingText').innerText = "กำลังโหลดข้อมูลงาน...";
        }
        
        try {
            const res = await fetch(`${WEB_APP_URL}?action=getAllJobs`);
            allJobs = await res.json();
            filterJobs(); 
        } catch (err) { console.error("โหลดข้อมูลไม่สำเร็จ"); }
        finally { loadingDiv.style.display = 'none'; }
    }

    function renderJobs(jobs) {
        const container = document.getElementById('jobContainer');
        container.innerHTML = jobs.length === 0 ? "<div style='text-align:center; color:#999; margin-top:50px;'>📭 ไม่พบรายการงานซ่อม</div>" : "";
    
        jobs.forEach(job => {
            const card = document.createElement('div');
            card.className = `job-card prio-${job.priority || 'ปกติ'}`;
            
            // --- ส่วนที่ปรับปรุง: การจัดการ Badge และสีพิเศษ ---
            let badgeClass = 'badge-pending'; // สีน้ำเงินมาตรฐาน
            let adminStyle = ""; // เก็บ Style พิเศษสำหรับชื่อเจ้าหน้าที่
    
            if (job.status === 'กำลังดำเนินการ') {
                badgeClass = 'badge-process'; // สีส้ม
            } 
            else if (job.status === 'ดำเนินการเรียบร้อยแล้ว') {
                badgeClass = 'badge-done'; // สีเขียว
            }
            else if (job.status === "จัดจ้างร้านภายนอก") {
                badgeClass = 'badge-external'; // สร้าง Class ใหม่เพื่อรอรับ CSS สีดำ-ทอง
                adminStyle = "color: #ffbf00; font-weight: bold;"; // บังคับชื่อเจ้าหน้าที่เป็นสีทอง
            }
            else if (job.status === "ยกเลิกรายการ") {
                badgeClass = 'badge-cancel'; // สีแดง
            }
            // ----------------------------------------------
    
            // ตรวจสอบชื่อเจ้าหน้าที่: ถ้าไม่มีให้แสดง "รอเจ้าหน้าที่รับงาน"
            const responsibleStaff = (job.adminName && job.adminName !== "undefined" && job.adminName !== "-") 
                                     ? `${job.adminName}` 
                                     : "⚠️ รอเจ้าหน้าที่รับงาน";
    
            card.innerHTML = `
                <div class="card-header">
                    <span class="ticket-id">${job.ticketId || 'N/A'}</span>
                    <span class="status-badge ${badgeClass}">${job.status || 'รอดำเนินการ'}</span>
                </div>
                <div class="card-body">
                    <span class="job-issue">${job.issue || 'ไม่มีหัวข้อ'}</span>
                    
                    <div class="info-grid">
                        <div class="info-row"><span class="info-label">⏰ เวลา:</span><span class="info-value">${job.timeStr || '-'}</span></div>
                        <div class="info-row"><span class="info-label">👤 ผู้แจ้ง:</span><span class="info-value">${job.name || '-'}</span></div>
                        <div class="info-row"><span class="info-label">🏢 สถานที่:</span><span class="info-value">${job.room || '-'}</span></div>
                        <div class="info-row"><span class="info-label">📁 ประเภท:</span><span class="info-value">${job.category || '-'}</span></div>
                        <div class="info-row"><span class="info-label">📝 รายละเอียด:</span><span class="info-value">${job.issue || '-'}</span></div>
                        <div class="info-row"><span class="info-label">👷 จนท.:</span><span class="info-value admin" style="${adminStyle}">${responsibleStaff}</span></div>
                    </div>
    
                    ${(job.imageUrl && job.imageUrl !== "") ? `
                    <div style="margin-top:15px; border-top:1px dashed #eee; padding-top:10px;">
                        <button onclick="let target = this.nextElementSibling; target.style.display = target.style.display === 'none' ? 'block' : 'none';" 
                                style="width:100%; background:#f8f9fa; border:1px solid #ddd; padding:8px; border-radius:8px; font-size:12px; color:#666; cursor:pointer;">
                            📷 กดเพื่อดูรูปภาพประกอบ
                        </button>
                        <div style="display:none; margin-top:10px; text-align:center;">
                            <img src="${job.imageUrl}" 
                                 loading="lazy"
                                 style="max-width:100%; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,0.1); cursor:zoom-in;"
                                 onclick="window.open(this.src, '_blank')"
                                 onerror="this.style.display='none'; this.parentElement.innerHTML='<p style=font-size:12px;color:red;>⚠️ไม่มีรูปภาพประกอบ</p>';">
                        </div>
                    </div>
                    ` : ''}
    
                    <div class="action-box">
                        <select class="action-select" onchange="updateJobStatus(${job.row}, this.value)">
                            <option value="" ${job.status === 'รอดำเนินการ' ? 'selected' : ''}>-- อัปเดตสถานะงาน --</option>
                            <option value="กำลังดำเนินการ" ${job.status === 'กำลังดำเนินการ' ? 'selected' : ''}>▶️ เข้าดำเนินการ</option>
                            <option value="จัดจ้างร้านภายนอก" ${job.status === 'จัดจ้างร้านภายนอก' ? 'selected' : ''}>🚚 จัดจ้างภายนอก</option>
                            <option value="ดำเนินการเรียบร้อยแล้ว" ${job.status === 'ดำเนินการเรียบร้อยแล้ว' ? 'selected' : ''}>✅ ดำเนินการเสร็จสิ้น</option>
                            <option value="รอดำเนินการ">🔄 ยกเลิกรับรายการนี้/คืนงาน </option>
                            <option value="ยกเลิกรายการ" ${job.status === 'ยกเลิกรายการ' ? 'selected' : ''}>🚫 ยกเลิกรายการนี้ </option>
                        </select>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function filterJobs() {
        const prefix = (adminDept.toLowerCase() === "admin") 
                       ? document.getElementById('prefixFilter').value 
                       : adminDept;
        let filtered = allJobs;
        if (prefix !== "ALL") {
            filtered = filtered.filter(j => j.ticketId.split('#')[0] === prefix);
        }
        filtered = filtered.filter(job => {
            if (job.status === "รอดำเนินการ") return true;
            if (adminDept.toLowerCase() === "admin") return true;
            return job.responsibleUid === currentAdminUid;
        });
        renderJobs(filtered);
    }

    async function updateJobStatus(row, newStatus) {
        if (!newStatus) return;
        if (!confirm(`ยืนยันการเปลี่ยนสถานะเป็น "${newStatus}" ?`)) {
            loadJobs();
            return;
        }
        document.getElementById('loadingText').innerText = "กำลังอัปเดตข้อมูล...";
        document.getElementById('loading').style.display = 'flex';
        try {
            const res = await fetch(`${WEB_APP_URL}?action=adminUpdate&row=${row}&status=${encodeURIComponent(newStatus)}&adminUid=${currentAdminUid}`);
            if (await res.text() === "SUCCESS") {
                await loadJobs();
            }
        } catch (e) { console.error("อัปเดตล้มเหลว"); }
        finally { document.getElementById('loading').style.display = 'none'; }
    }

async function getTokenAndSave() {
    try {
        if (!currentAdminUid) {
            console.log("Waiting for UID...");
            await new Promise(res => setTimeout(res, 2000));
        }
        
        const registration = await navigator.serviceWorker.register('sw.js');    
        await navigator.serviceWorker.ready;
        console.log('SW Ready');
        const currentToken = await messaging.getToken({
            serviceWorkerRegistration: registration,
            vapidKey: 'BOo7SEZSwEbGtmt886r6_OvMxPvnRXvAemQtMD55P6dVYe5P_o_27rkCfnXO8uRIpmkOCB95RKPQa9u5zQaomBw'
        });

        if (currentToken) {
            const finalUid = currentAdminUid || "NO_UID_FOUND";
            const params = new URLSearchParams({
                action: 'saveAdminToken',
                uid: finalUid,
                token: currentToken
            });

            console.log('Sending to GAS:', finalUid);

            fetch(`${WEB_APP_URL}?${params.toString()}`, {
                method: 'GET',
                mode: 'no-cors',
                cache: 'no-cache'
            });

            //alert(`บันทึกข้อมูลสำเร็จ!\nUID: ${finalUid}\nกรุณาเช็คใน Sheet ครับ`);
            alert(`บันทึก Request Token สำเร็จ!\nเปิดรับการแจ้งเตือนเรียบร้อยแล้ว`);
        } else {
            alert('ไม่ได้รับ Token จาก Firebase');
        }
    } catch (err) {
        alert('Error: ' + err.message);
    }
}

async function enableNotificationForIOS() {
    const permission = await Notification.requestPermission();
    if (permission === 'granted') {
        await getTokenAndSave();
    } else {
        alert("สถานะสิทธิ์: " + permission + "\nกรุณาเปิดสิทธิ์ใน Settings");
    }
}

async function initializeApp() {
    if ('serviceWorker' in navigator) {
        try {
            await navigator.serviceWorker.register('sw.js');
        } catch (e) { console.error("SW Register Fail"); }
    }

    await main();

    if (Notification.permission === 'granted') {
        getTokenAndSave();
    }
}

initializeApp();

</script>
</body>
</html>
