<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ติดตามสถานะการขอใช้บริการ</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #000080; --bg: #f0f2f5; --white: #ffffff; }
        * { box-sizing: border-box; font-family: 'Prompt', sans-serif; }
        body { background-color: var(--bg); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; padding-bottom: 40px; }

        /* ส่วนค้นหา */
        .search-card { background: white; padding: 25px; border-radius: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; margin-bottom: 20px; border: 1px solid #e0e0e0; }
        .form-group { text-align: left; margin-bottom: 15px; }
        .form-group label { font-size: 14px; color: var(--primary); font-weight: 600; display: block; margin-bottom: 5px; }
        select, input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; outline: none; }
        .btn-search { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-search:active { transform: scale(0.98); opacity: 0.9; }

        /* ส่วนแสดงผล Guest Mode */
        .guest-alert { background: #fff3e0; color: #e65100; padding: 10px; border-radius: 8px; font-size: 13px; margin-bottom: 15px; border: 1px dashed #ffb74d; text-align: left;}

        /* การ์ดผลลัพธ์ */
        .flex-style-card { background: var(--white); border-radius: 18px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.08); border: 1px solid #e0e0e0; display: none; }
        .card-header { background: var(--primary); color: white; padding: 18px 20px; display: flex; justify-content: space-between; align-items: center; }
        .header-title { font-size: 15px; font-weight: 600; }
        .header-ticket { font-size: 14px; opacity: 0.9; }

        .card-body { padding: 20px; }
        .status-badge-box { padding: 15px; border-radius: 12px; margin-bottom: 20px; transition: 0.3s; }
        .status-label { font-weight: 600; font-size: 16px; margin: 0; }
        .queue-label { font-size: 13px; color: #555; margin-top: 5px; display: block; }

        .info-item { display: flex; margin-bottom: 12px; line-height: 1.4; }
        .info-key { flex: 2; color: #aaaaaa; font-size: 13px; }
        .info-val { flex: 5; color: #444; font-size: 13px; font-weight: 400; }
        .info-val.bold { color: var(--primary); font-weight: 600; }

        .separator { height: 1px; background: #eee; margin: 15px 0; }
        .btn-review { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        
        #loader { text-align: center; padding: 30px 0; color: var(--primary); display: none; }
        .loading-dots:after { content: ' .'; animation: dots 1.5s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { color: rgba(0,0,0,0); } 40% { color: var(--primary); } 100% { text-shadow: .25em 0 0 var(--primary), .5em 0 0 var(--primary); } }
    </style>
</head>
<body>

<div class="container">
    <div id="searchSection" class="search-card">
        <h3 style="margin-top:0; color: var(--primary);">🔍 ติดตามสถานะงานซ่อม</h3>
        
        <div id="guestStatus" class="guest-alert" style="display:none;">
            คุณกำลังใช้งานในโหมดบุคคลทั่วไป (Guest) กรุณาระบุ Username ที่ใช้แจ้งซ่อมเพื่อยืนยันตัวตน
        </div>

        <div class="form-group">
            <label>เลือกแผนก</label>
            <select id="deptSelect"><option value="">-- กำลังโหลดแผนก --</option></select>
        </div>
        <div class="form-group">
            <label>หมายเลขงาน (เฉพาะตัวเลข)</label>
            <input type="number" id="numInput" placeholder="เช่น 1">
        </div>
        
        <div class="form-group" id="userGroup" style="display:none;">
            <label>Username (ที่ระบุตอนแจ้งซ่อม)</label>
            <input type="text" id="userInput" placeholder="เช่น somchai.p">
        </div>

        <button class="btn-search" onclick="manualSearch()">ตรวจสอบข้อมูล</button>
    </div>

    <div id="loader">
        <h3 class="loading-dots">⏳ กำลังตรวจสอบข้อมูล</h3>
    </div>

    <div id="result" class="flex-style-card">
        <div class="card-header">
            <span class="header-title">รายการแจ้งซ่อม</span>
            <span id="dispId" class="header-ticket"></span>
        </div>
        <div class="card-body">
            <div id="statusBadgeBox" class="status-badge-box">
                <p id="dispStatus" class="status-label"></p>
                <p id="dispQueue" class="queue-label"></p>
            </div>
            <div class="info-item"><span class="info-key">🏢 สถานที่:</span><span id="dispRoom" class="info-val"></span></div>
            <div class="info-item"><span class="info-key">📁 ประเภท:</span><span id="dispCategory" class="info-val"></span></div>
            <div class="info-item"><span class="info-key">📝 รายละเอียด:</span><span id="dispIssue" class="info-val"></span></div>
            <div class="info-item"><span class="info-key">👷 เจ้าหน้าที่:</span><span id="dispAdmin" class="info-val bold"></span></div>
            <div style="text-align: right; margin-top: 5px;"><span id="dispTime" style="font-size: 10px; color: #ccc;"></span></div>
            
            <div id="reviewArea" style="display:none">
                <div class="separator"></div>
                <p style="text-align:center; font-size:11px; color:#aaa; margin-bottom:10px;">✨ รบกวนให้คะแนนเพื่อพัฒนาการบริการ</p>
                <button class="btn-review" id="reviewBtn">⭐ ประเมินความพึงพอใจ</button>
            </div>
        </div>
    </div>
</div>

<script>
    // *** อย่าลืมตรวจสอบ URL ให้ตรงกับ Deploy ล่าสุด ***
    const URL_GAS = "https://script.google.com/macros/s/AKfycbwMDUnd9cXi1XTy9NZ-Awi29gxMoW3yd7wOKV10fLXzKP3gHlCowdnJzN7lACXNdLCY/exec";
    const LIFF_ID_TRACK = "2008875334-wOYUvNha";
    const LIFF_ID_REVIEW = "2008875334-d6l72Uox"; 

    let myUid = "";
    let isGuest = false;

    async function init() {
        try {
            await liff.init({ liffId: LIFF_ID_TRACK });
            
            // 1. ตรวจสอบสถานะ Login
            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                myUid = profile.userId;
                isGuest = false;
            } else {
                isGuest = true;
                // แสดง UI สำหรับ Guest
                document.getElementById('guestStatus').style.display = 'block';
                document.getElementById('userGroup').style.display = 'block';
            }
            
            // 2. ตรวจสอบ Parameter จาก URL
            const urlParams = new URLSearchParams(window.location.search);
            const ticketFromUrl = urlParams.get('ticket');
            const userFromUrl = urlParams.get('user');

            // กรณี Auto: มี ticket มากับ URL
            if (ticketFromUrl) {
                // ถ้าเป็น Guest และมี user ติดมาด้วย ให้สร้าง UID จำลอง
                if (isGuest && userFromUrl) {
                    myUid = "GUEST_" + userFromUrl.trim().toLowerCase();
                    // เติมค่าใส่ Input ไว้ด้วย เผื่อเขาอยากกดค้นหาเองใหม่
                    document.getElementById('userInput').value = userFromUrl;
                }
                
                // กรอกข้อมูลลงฟอร์มอัตโนมัติ (เผื่อค้นหาไม่เจอ จะได้ไม่ต้องกรอกใหม่)
                const parts = decodeURIComponent(ticketFromUrl).split('#');
                if(parts.length === 2) {
                     // โหลดแผนกก่อน แล้วค่อย set value
                    await loadDepts(); 
                    document.getElementById('deptSelect').value = parts[0];
                    document.getElementById('numInput').value = parseInt(parts[1]);
                } else {
                    loadDepts();
                }

                autoProcess(decodeURIComponent(ticketFromUrl), false); 
            } else { 
                loadDepts(); 
            }

        } catch (e) { console.error("Init Error:", e); }
    }

    async function loadDepts() {
        try {
            const res = await fetch(`${URL_GAS}?action=getPrefixes`);
            const prefixes = await res.json();
            const sel = document.getElementById('deptSelect');
            // เก็บค่าเดิมไว้ก่อน ถ้ามี
            const currentVal = sel.value; 
            sel.innerHTML = '<option value="">-- เลือกแผนก --</option>';
            prefixes.forEach(p => {
                let opt = document.createElement('option');
                opt.value = p; opt.innerText = p;
                sel.appendChild(opt);
            });
            if(currentVal) sel.value = currentVal;
        } catch(e) {}
    }

    async function manualSearch() {
        const dept = document.getElementById('deptSelect').value;
        const num = document.getElementById('numInput').value;
        
        if (!dept || !num) return alert("กรุณาระบุแผนกและหมายเลขงาน");

        // ถ้าเป็น Guest ต้องบังคับกรอก Username
        if (isGuest) {
            const userInput = document.getElementById('userInput').value.trim();
            if (!userInput) return alert("กรุณาระบุ Username เพื่อยืนยันตัวตน");
            myUid = "GUEST_" + userInput.toLowerCase();
        }
        
        const fullId = `${dept}#${num.padStart(3, '0')}`;
        
        document.getElementById('result').style.display = 'none';
        autoProcess(fullId, true);
    }

    async function autoProcess(tid, isManual = false) {
        if (!myUid) {
            alert("ไม่พบข้อมูลผู้ใช้งาน กรุณาลองใหม่");
            return;
        }

        document.getElementById('loader').style.display = 'block';

        try {
            // ส่ง tid และ uid ไปเช็คที่ GAS
            // GAS จะเช็คว่า Ticket นี้ เป็นของ UID นี้จริงหรือไม่
            const res = await fetch(`${URL_GAS}?action=track&tid=${encodeURIComponent(tid)}&uid=${encodeURIComponent(myUid)}`);
            const data = await res.json();

            if (data.found) {
                renderUI(tid, data);

                // ถ้าค้นหาเจอและเปิดใน LINE ให้ส่ง Flex Message เก็บไว้ดู
                if (liff.isInClient() && !isManual) {
                    try {
                        await sendFlexUpdate(tid, data);
                    } catch (err) { console.error("Flex Error:", err); }
                }
                
                // เลื่อนหน้าจอลงมาที่ผลลัพธ์
                setTimeout(() => {
                    document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
                }, 100);

            } else {
                alert("ไม่พบข้อมูล!\n\nสาเหตุที่เป็นไปได้:\n1. เลขงานไม่ถูกต้อง\n2. คุณไม่ใช่ผู้แจ้งงานนี้ (Username ไม่ตรง)\n3. งานนี้ยังไม่เข้าระบบ");
                document.getElementById('result').style.display = 'none';
            }
        } catch (e) { alert("Error: " + e.message); }
        finally {
            document.getElementById('loader').style.display = 'none';
        }
    }

    function renderUI(tid, data) {
        document.getElementById('dispId').innerText = tid;
        document.getElementById('dispRoom').innerText = data.room || "-";
        document.getElementById('dispCategory').innerText = data.category || "-";
        document.getElementById('dispIssue').innerText = data.issue || "-";
        document.getElementById('dispAdmin').innerText = data.admin || "เรากำลังประสานงานหาเจ้าหน้าที่ให้คุณ";
        document.getElementById('dispTime').innerText = "อัปเดตเมื่อ: " + (data.time || "-");
        
        const status = data.status || "รอดำเนินการ";
        const badgeBox = document.getElementById('statusBadgeBox');
        const statusText = document.getElementById('dispStatus');
        const queueText = document.getElementById('dispQueue');
        const reviewArea = document.getElementById('reviewArea'); // พื้นที่ปุ่มรีวิว
        
        statusText.innerText = "สถานะ: " + status;

        // ล้าง Style และซ่อนส่วนประเมินก่อน
        badgeBox.style.backgroundColor = "#eef3ff"; 
        statusText.style.color = "#000080";
        queueText.style.display = "none";
        reviewArea.style.display = 'none';

        if (status === "กำลังดำเนินการ") {
            badgeBox.style.backgroundColor = "#fff4e6"; 
            statusText.style.color = "#d9480f";
        } else if (status === "ดำเนินการเรียบร้อยแล้ว") {
            badgeBox.style.backgroundColor = "#ebfbee"; 
            statusText.style.color = "#2b8a3e";
            
            // --- ส่วนที่เพิ่มเข้ามาเพื่อให้ปุ่มทำงานได้ ---
            reviewArea.style.display = 'block'; 
            const reviewBtn = document.getElementById('reviewBtn');
            
            // ล้าง Event เก่า (ป้องกันการสะสมจากการค้นหาหลายครั้ง)
            const newBtn = reviewBtn.cloneNode(true);
            reviewBtn.parentNode.replaceChild(newBtn, reviewBtn);

            newBtn.onclick = () => {
                if (!data.row) return alert("ไม่พบข้อมูลเลขแถวสำหรับการประเมิน");
                
                // สร้างลิงก์ไปยัง LIFF Review
                const reviewUrl = `https://liff.line.me/${LIFF_ID_REVIEW}?row=${data.row}`;
                
                if (liff.isInClient()) {
                    liff.openWindow({ url: reviewUrl, external: false });
                } else {
                    window.location.href = reviewUrl;
                }
            };
            // ------------------------------------------

        } else if (status === "ยกเลิก") {
            badgeBox.style.backgroundColor = "#fff5f5"; 
            statusText.style.color = "#ff3b30";
        } else if (status === "จัดจ้างร้านภายนอก") {
            badgeBox.style.backgroundColor = "#343a40"; 
            statusText.style.color = "#ffbf00";
        } else if (status === "รอดำเนินการ") {
            queueText.style.display = "block";
            queueText.innerText = "คิวที่รอก่อนหน้านี้: " + (data.pendingCount || "0") + " คิว";
        }
        
        document.getElementById('result').style.display = 'block';
    }

    async function sendFlexUpdate(tid, data) {
        const fStatus = String(data.status || "รอดำเนินการ");
        const fQueue = String(data.pendingCount || "0");
        const fRoom = String(data.room || "-");
        const fCategory = String(data.category || "-");
        const fIssue = String(data.issue || "-");
        const fAdmin = String(data.admin || "เรากำลังประสานงานหาเจ้าหน้าที่ให้คุณ");
        const fRow = data.row;

        // --- ส่วนที่ปรับปรุงใหม่: เพิ่มสี ยกเลิก และ จัดจ้างร้านภายนอก ---
        let statusBg = "#eef3ff"; 
        let statusColor = "#000080";

        if (fStatus === "กำลังดำเนินการ") { 
            statusBg = "#fff4e6"; 
            statusColor = "#d9480f"; 
        } else if (fStatus === "ดำเนินการเรียบร้อยแล้ว") { 
            statusBg = "#ebfbee"; 
            statusColor = "#2b8a3e"; 
        } else if (fStatus === "ยกเลิก") { 
            statusBg = "#fff5f5"; 
            statusColor = "#ff3b30"; // สีแดงสด
        } else if (fStatus === "จัดจ้างร้านภายนอก") { 
            statusBg = "#343a40";    // สีดำ/เทาเข้ม
            statusColor = "#ffbf00"; // สีเหลืองทอง
        }
        // --------------------------------------------------------

        let statusContents = [{ "type": "text", "text": "สถานะ: " + fStatus, "weight": "bold", "color": statusColor, "size": "sm" }];
        
        // แสดงคิวเฉพาะตอน รอดำเนินการ
        if (fStatus === "รอดำเนินการ") {
            statusContents.push({ "type": "text", "text": "คิวที่รอก่อนหน้านี้: " + fQueue + " คิว", "size": "xs", "color": "#666666", "margin": "xs" });
        }

        const flexPayload = {
            "type": "bubble", "size": "mega",
            "header": {
                "type": "box", "layout": "horizontal", "backgroundColor": "#000080",
                "contents": [
                    { "type": "text", "text": "รายการแจ้งซ่อม", "weight": "bold", "color": "#FFFFFF", "size": "sm" },
                    { "type": "text", "text": String(tid), "align": "end", "weight": "bold", "color": "#FFFFFF", "size": "sm" }
                ]
            },
            "body": {
                "type": "box", "layout": "vertical", "spacing": "md",
                "contents": [
                    { "type": "box", "layout": "vertical", "backgroundColor": statusBg, "cornerRadius": "md", "paddingAll": "md", "contents": statusContents },
                    {
                        "type": "box", "layout": "vertical", "spacing": "sm",
                        "contents": [
                            { "type": "box", "layout": "baseline", "spacing": "sm", "contents": [{ "type": "text", "text": "🏢 สถานที่:", "color": "#aaaaaa", "size": "xs", "flex": 2 }, { "type": "text", "text": fRoom, "wrap": true, "color": "#666666", "size": "xs", "flex": 5 }] },
                            { "type": "box", "layout": "baseline", "spacing": "sm", "contents": [{ "type": "text", "text": "📁 ประเภท:", "color": "#aaaaaa", "size": "xs", "flex": 2 }, { "type": "text", "text": fCategory, "wrap": true, "color": "#666666", "size": "xs", "flex": 5 }] },
                            { "type": "box", "layout": "baseline", "spacing": "sm", "contents": [{ "type": "text", "text": "📝 รายละเอียด:", "color": "#aaaaaa", "size": "xs", "flex": 2 }, { "type": "text", "text": fIssue, "wrap": true, "color": "#666666", "size": "xs", "flex": 5 }] },
                            { "type": "box", "layout": "baseline", "spacing": "sm", "contents": [{ "type": "text", "text": "👷 เจ้าหน้าที่:", "color": "#aaaaaa", "size": "xs", "flex": 2 }, { "type": "text", "text": fAdmin, "wrap": true, "color": statusColor === "#ffbf00" ? "#ffbf00" : "#000080", "size": "xs", "flex": 5, "weight": "bold" }] }
                        ]
                    }
                ]
            },
            // Footer แสดงปุ่มติดตามงาน (ซ่อนเฉพาะเมื่อ ดำเนินการเรียบร้อยแล้ว)
            "footer": (fStatus === "ดำเนินการเรียบร้อยแล้ว" || fStatus === "ยกเลิกรายการ")? undefined : {
                "type": "box", "layout": "vertical",
                "contents": [{
                    "type": "button", "style": "primary", "color": "#000080", "height": "sm",
                    "action": { "type": "uri", "label": "ติดตามสถานะงาน", "uri": "https://liff.line.me/" + LIFF_ID_TRACK + "?ticket=" + encodeURIComponent(tid) }
                }]
            }
        };

        return await liff.sendMessages([{ "type": "flex", "altText": "อัปเดตสถานะงาน " + tid, "contents": flexPayload }]);
    }

    init();
</script>
</body>
</html>
