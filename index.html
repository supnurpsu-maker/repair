<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบแจ้งขอใช้บริการสารสนเทศ</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root {
            --primary: #000080;
            --accent: #FBCEB1;
            --bg: #f4f7fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            padding: 20px;
            margin: 0;
        }

        .card {
            background: white;
            max-width: 500px;
            margin: 10px auto;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,128,0.1);
            overflow: hidden;
        }

        .header {
            background: var(--primary);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .profile-bar {
            display: flex;
            align-items: center;
            background: var(--accent);
            padding: 12px 20px;
        }

        #userImg {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid var(--primary);
            margin-right: 15px;
        }

        form {
            padding: 20px;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
            color: var(--primary);
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 8px;
            margin-top: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
        }

        button:disabled {
            background: #ccc;
        }

        #loading {
            display: none;
            text-align: center;
            margin-top: 10px;
            color: var(--primary);
            font-weight: bold;
        }

        .img-preview {
            width: 100%;
            margin-top: 10px;
            border-radius: 8px;
            display: none;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="header"><h2 style="margin:0;">ระบบแจ้งขอใช้บริการสารสนเทศ</h2></div>
        <div class="profile-bar">
            <img id="userImg" src="" alt="Profile">
            <span id="userName" style="font-weight:bold;">กำลังโหลด...</span>
        </div>

        <form id="repairForm">
            <div id="guestField" style="display:none;">
                <label for="username">PSU Passport(Username/Student ID)</label>
                <input type="text" id="username" placeholder="thunyapong.u / 6910410000" pattern="[a-z0-9.]+" title="กรุณาใช้ภาษาอังกฤษพิมพ์เล็กหรือตัวเลขสำหรับรหัสนักศึกษาเท่านั้น">
            </div>

            <label for="room">สถานที่ / เลขห้อง</label>
            <input type="text" id="room" required placeholder="ห้องประชุมดวงวดี สังโขบล / 2228">

            <label for="phone">เบอร์ภายใน / เบอร์โทรศัพท์ติดต่อ</label>
            <input type="tel" id="phone" required placeholder="XXXX / 0XX-XXXXXXX">

            <label for="category">ประเภท</label>
            <select id="category" required>
                <option value="">-- เลือก --</option>
                <option value="Computer">เครื่องคอมพิวเตอร์/โน้ตบุ๊ก</option>
                <option value="Smartphone">สมาร์ทโฟน</option>
                <option value="Network">ระบบเครือข่าย (LAN/Wi-Fi)</option>
                <option value="PSU Passport">บริการของสำนักนวัตกรรมฯ(Passport, VPN, MFA,Office365)</option>
                <option value="ZOOM/UC-Phone">ZOOM/UC Phone</option>
                <option value="CCTV/FingerPrint Scan">ระบบกล้องวงจรปิด/เครื่องสแกนควบคุมเปิด-ปิดประตู</option>
                <option value="Others">อื่นๆ</option>
                <option value="Elec">งานไฟฟ้า</option>
            </select>

            <label for="issue">ปัญหาที่พบ / อาการ / ความต้องการใช้บริการ</label>
            <textarea id="issue" rows="3" required placeholder="อธิบายความต้องการใช้บริการหรือปัญหาเบื้องต้น"></textarea>

            <label for="priority">ความเร่งด่วน</label>
            <select id="priority">
                <option value="ปกติ">ปกติ</option>
                <option value="ด่วน">ด่วน</option>
                <option value="ด่วนที่สุด">ด่วนที่สุด</option>
            </select>

            <label for="image">แนบรูปภาพ 1 รูป(ถ้ามี)</label>
            <input type="file" id="image" accept="image/*">
            <img id="preview" class="img-preview">

            <button type="submit" id="submitBtn">ส่งข้อมูลขอใช้บริการ</button>
            <div id="loading">🚀 กำลังส่งข้อมูลแจ้งเตือนเจ้าหน้าที่......</div>
        </form>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwMDUnd9cXi1XTy9NZ-Awi29gxMoW3yd7wOKV10fLXzKP3gHlCowdnJzN7lACXNdLCY/exec";
        const LIFF_ID_MAIN = "2008875334-eZXiyz43"; 
        const LIFF_ID_TRACK = "2008875334-wOYUvNha"; 

        const form = document.getElementById('repairForm');
        const btn = document.getElementById('submitBtn');
        const loading = document.getElementById('loading');
        let userProfile = null;
        let isGuestMode = false;

        async function main() {
            try {
                await liff.init({ liffId: LIFF_ID_MAIN });
                if (liff.isLoggedIn()) {
                    userProfile = await liff.getProfile();
                    document.getElementById('userImg').src = userProfile.pictureUrl || "https://via.placeholder.com/45";
                    document.getElementById('userName').innerText = userProfile.displayName;
                } else {
                    // ปรับให้เป็น Guest Mode แทนการสั่ง login() ทันที
                    isGuestMode = true;
                    document.getElementById('userImg').src = "https://supnurpsu-maker.github.io/repair/icon-192.png";
                    document.getElementById('userName').innerText = "ผู้ใช้งานผ่านเบราว์เซอร์";
                    document.getElementById('guestField').style.display = 'block';
                    document.getElementById('username').required = true;
                }
            } catch (err) {
                console.error("LIFF Error:", err);
                isGuestMode = true;
                document.getElementById('guestField').style.display = 'block';
                document.getElementById('username').required = true;
            }
        }

        main();

        document.getElementById('image').onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    document.getElementById('preview').src = ev.target.result;
                    document.getElementById('preview').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        };

        form.onsubmit = async (e) => {
            e.preventDefault();

            if (!isGuestMode && !userProfile) {
                alert("กรุณารอโหลดข้อมูลโปรไฟล์สักครู่");
                return;
            }

            btn.disabled = true;
            btn.innerText = "กำลังบันทึกข้อมูลขอใช้บริการ...";
            loading.style.display = 'block';

            const fileInput = document.getElementById('image');
            let base64 = "";
            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                base64 = await new Promise(resolve => {
                    const reader = new FileReader();
                    reader.onload = (ev) => resolve(ev.target.result.split(',')[1]);
                    reader.readAsDataURL(file);
                });
            }

            // กำหนด UID และ DisplayName ตามเงื่อนไข Guest
            let finalUid = isGuestMode ? "GUEST_" + document.getElementById('username').value.trim().toLowerCase() : userProfile.userId;
            let finalDisplayName = isGuestMode ? document.getElementById('username').value.trim() : userProfile.displayName;

            const payload = {
                uid: finalUid,
                displayName: finalDisplayName,
                room: document.getElementById('room').value,
                phone: document.getElementById('phone').value,
                category: document.getElementById('category').value,
                issue: document.getElementById('issue').value,
                priority: document.getElementById('priority').value,
                imageBase64: base64
            };

            try {
                const response = await fetch(GAS_URL, {
                    method: "POST",
                    body: JSON.stringify(payload)
                });
                const res = await response.json();

                if (res.result === "ok") {
                    var fRoom = (document.getElementById('room').value || "-").replace(/["\\]/g, "");
                    var fCategory = (document.getElementById('category').value || "-").replace(/["\\]/g, "");
                    var fIssue = (document.getElementById('issue').value || "-").replace(/["\\]/g, "");
                    var fTicket = String(res.ticketId || "ID");
                    var fQueue = String(res.pendingCount || "0");
                    const fRow = res.row;
                    var trackUrl = "https://liff.line.me/" + LIFF_ID_TRACK + "?ticket=" + encodeURIComponent(fTicket);

                    if (liff.isInClient()) {
                        const flexPayload = {
                            "type": "bubble",
                            "size": "mega",
                            "header": {
                                "type": "box",
                                "layout": "horizontal",
                                "backgroundColor": "#000080",
                                "contents": [
                                    { "type": "text", "text": "รายการแจ้งซ่อม", "weight": "bold", "color": "#FFFFFF", "size": "sm" },
                                    { "type": "text", "text": fTicket, "align": "end", "weight": "bold", "color": "#FFFFFF", "size": "sm" }
                                ]
                            },
                            "body": {
                                "type": "box",
                                "layout": "vertical",
                                "spacing": "md",
                                "contents": [
                                    {
                                        "type": "box",
                                        "layout": "vertical",
                                        "backgroundColor": "#eef3ff",
                                        "cornerRadius": "md",
                                        "paddingAll": "md",
                                        "contents": [
                                            { "type": "text", "text": "สถานะ: รอดำเนินการ", "weight": "bold", "color": "#000080", "size": "sm" },
                                            { "type": "text", "text": "คิวที่รอก่อนหน้านี้: " + fQueue + " คิว", "size": "xs", "color": "#666666", "margin": "xs" }
                                        ]
                                    },
                                    {
                                        "type": "box",
                                        "layout": "vertical",
                                        "spacing": "sm",
                                        "contents": [
                                            {
                                                "type": "box",
                                                "layout": "baseline",
                                                "spacing": "sm",
                                                "contents": [
                                                    { "type": "text", "text": "🏢 สถานที่:", "color": "#aaaaaa", "size": "xs", "flex": 2 },
                                                    { "type": "text", "text": fRoom, "wrap": true, "color": "#666666", "size": "xs", "flex": 5 }
                                                ]
                                            },
                                            {
                                                "type": "box",
                                                "layout": "baseline",
                                                "spacing": "sm",
                                                "contents": [
                                                    { "type": "text", "text": "📁 ประเภท:", "color": "#aaaaaa", "size": "xs", "flex": 2 },
                                                    { "type": "text", "text": fCategory, "wrap": true, "color": "#666666", "size": "xs", "flex": 5 }
                                                ]
                                            },
                                            {
                                                "type": "box",
                                                "layout": "baseline",
                                                "spacing": "sm",
                                                "contents": [
                                                    { "type": "text", "text": "📝 รายละเอียด:", "color": "#aaaaaa", "size": "xs", "flex": 2 },
                                                    { "type": "text", "text": fIssue, "wrap": true, "color": "#666666", "size": "xs", "flex": 5 }
                                                ]
                                            },
                                            {
                                                "type": "box",
                                                "layout": "baseline",
                                                "spacing": "sm",
                                                "contents": [
                                                    { "type": "text", "text": "👷 เจ้าหน้าที่:", "color": "#aaaaaa", "size": "xs", "flex": 2 },
                                                    { "type": "text", "text": "รอการตอบรับจากเจ้าหน้าที่", "wrap": true, "color": "#ffbf00", "size": "xs", "flex": 5, "weight": "bold" }
                                                ]
                                            }
                                        ]
                                    },
                                    // { "type": "separator", "margin": "xl" },
                                    // { "type": "text", "text": "รบกวนให้คะแนนเมื่อบริการเสร็จสิ้น", "align": "center", "size": "xxs", "color": "#aaaaaa", "margin": "md" },
                                    // {
                                    //     "type": "box",
                                    //     "layout": "horizontal",
                                    //     "margin": "md",
                                    //     "spacing": "xs",
                                    //     "contents": [1, 2, 3, 4, 5].map(function (score) {
                                    //         return {
                                    //             "type": "box",
                                    //             "layout": "vertical",
                                    //             "backgroundColor": "#eeeeee",
                                    //             "cornerRadius": "sm",
                                    //             "paddingAll": "8px",
                                    //             "action": {
                                    //                 "type": "uri",
                                    //                 "label": "⭐ " + score,
                                    //                 "uri": "https://liff.line.me/2008875334-d6l72Uox?row=" + fRow + "&score=" + score
                                    //             },
                                    //             "contents": [
                                    //                 { "type": "text", "text": "⭐ " + score, "size": "xs", "align": "center", "weight": "bold", "color": "#333333" }
                                    //             ]
                                    //         };
                                    //     })
                                    // }
                                ]
                            },
                            "footer": {
                                "type": "box",
                                "layout": "vertical",
                                "contents": [
                                    {
                                        "type": "button",
                                        "style": "primary",
                                        "color": "#000080",
                                        "height": "sm",
                                        "action": { "type": "uri", "label": "ติดตามสถานะงาน", "uri": trackUrl }
                                    }
                                ]
                            }
                        };

                        liff.sendMessages([{ "type": "flex", "altText": "แจ้งซ่อมสำเร็จ Ticket: " + fTicket, "contents": flexPayload }])
                            .then(() => liff.closeWindow())
                            .catch((err) => { alert("ส่งข้อความไม่สำเร็จ: " + err.message); liff.closeWindow(); });
                    } else {
                        // กรณีเปิดผ่าน Browser ภายนอก (ไม่ใช่แอป LINE)
                        alert("บันทึกข้อมูลสำเร็จ!\nTicket ID: " + fTicket + "\nUsername: " + finalDisplayName);
                        
                        // สร้าง URL สำหรับ Redirect พร้อมส่งค่าไปที่หน้าติดตามสถานะ
                        // โดยส่ง ticket และ user ไปใน URL เพื่อให้หน้า track.html ดึงไปใช้ได้ทันที
                        const trackPageUrl = "https://liff.line.me/" + LIFF_ID_TRACK + 
                                             "?ticket=" + encodeURIComponent(fTicket) + 
                                             "&user=" + encodeURIComponent(finalDisplayName);
                        
                        // เปลี่ยนหน้าไปยังหน้าติดตามสถานะ
                        window.location.href = trackPageUrl;
                    }
                } else {
                    alert("เกิดข้อผิดพลาด: " + res.message);
                }
            } catch (err) {
                alert("Error: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "ส่งข้อมูลขอใช้บริการ";
                loading.style.display = 'none';
            }
        };
    </script>
</body>
</html>
