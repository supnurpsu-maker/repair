<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ประเมินความพึงพอใจการให้บริการซ่อม</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #000080; --accent: #ffcc00; --bg: #f8f9fa; }
        * { box-sizing: border-box; font-family: 'Prompt', sans-serif; }
        body { background-color: var(--bg); margin: 0; padding: 20px; text-align: center; }
        
        .card {
            background: white; padding: 30px 20px; border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; margin: auto;
        }

        .header-icon { font-size: 50px; margin-bottom: 10px; }
        h2 { color: var(--primary); margin: 10px 0; }
        p { color: #666; font-size: 14px; margin-bottom: 30px; }

        .star-rating {
            display: flex; flex-direction: row-reverse; justify-content: center;
            gap: 10px; margin-bottom: 30px;
        }
        .star-rating input { display: none; }
        .star-rating label {
            font-size: 40px; color: #ddd; cursor: pointer; transition: 0.2s;
        }
        .star-rating input:checked ~ label { color: var(--accent); }
        .star-rating label:hover, .star-rating label:hover ~ label { color: var(--accent); }

        .btn-submit {
            width: 100%; padding: 15px; background: var(--primary);
            color: white; border: none; border-radius: 12px;
            font-size: 18px; font-weight: 600; cursor: pointer;
            transition: 0.3s;
        }
        .btn-submit:disabled { background: #ccc; cursor: not-allowed; }

        #loader {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8); z-index: 1000;
            padding-top: 50%;
        }
    </style>
</head>
<body>

<div id="loader">⏳ กำลังบันทึกคะแนน...</div>

<div class="card">
    <div class="header-icon">⭐</div>
    <h2>ประเมินความพึงพอใจ</h2>
    <p>คะแนนของคุณช่วยให้เราพัฒนาการบริการให้ดียิ่งขึ้น</p>

    <div class="star-rating">
        <input type="radio" name="stars" id="star5" value="5"><label for="star5">★</label>
        <input type="radio" name="stars" id="star4" value="4"><label for="star4">★</label>
        <input type="radio" name="stars" id="star3" value="3"><label for="star3">★</label>
        <input type="radio" name="stars" id="star2" value="2"><label for="star2">★</label>
        <input type="radio" name="stars" id="star1" value="1"><label for="star1">★</label>
    </div>

    <button class="btn-submit" id="submitBtn" onclick="sendReview()">ส่งคะแนนประเมิน</button>
</div>

<script>
    const URL_GAS = "https://script.google.com/macros/s/AKfycby247nUgLompR2Iq3FDXCfvQkjLDsDbi-5qsyMoAapQpp6wl6oN8GybUmrMlBeknCDj/exec";
    const LIFF_ID = "2008875334-d6l72Uox";

    async function init() {
        try {
            // 1. รอให้ LIFF Init จนเสร็จ
            await liff.init({ liffId: LIFF_ID });
            
            if (!liff.isLoggedIn()) {
                liff.login();
                return; // หยุดรอให้ Login เสร็จก่อน
            }

            // 2. ดึงค่าจาก URL
            const urlParams = new URLSearchParams(window.location.search);
            const row = urlParams.get('row');
            const score = urlParams.get('score');

            // 3. แสดงดาวที่เลือกบนหน้าเว็บ (เพื่อให้ User รู้ว่าเลือกเลขอะไรมา)
            if (score) {
                const starRadio = document.getElementById('star' + score);
                if (starRadio) starRadio.checked = true;
            }

            // 4. ถ้ามีค่าครบ ให้เริ่มการส่งข้อมูลอัตโนมัติ
            if (row && score) {
                console.log("Auto-submitting review for row:", row, "score:", score);
                // ใช้ setTimeout เล็กน้อยเพื่อให้หน้าเว็บ Render ดาวเสร็จก่อนส่ง
                setTimeout(() => {
                    sendReview(row, score);
                }, 500);
            }
        } catch (e) {
            console.error("LIFF Init Error:", e);
            alert("เกิดข้อผิดพลาดในการโหลดระบบ: " + e.message);
        }
    }

    async function sendReview(autoRow = null, autoScore = null) {
    const urlParams = new URLSearchParams(window.location.search);
    const row = autoRow || urlParams.get('row');
    const selectedStar = document.querySelector('input[name="stars"]:checked');
    const score = autoScore || (selectedStar ? selectedStar.value : null);
    
    if (!row || !score) {
        alert("ข้อมูลไม่ครบถ้วน");
        return;
    }

    document.getElementById('submitBtn').disabled = true;
    document.getElementById('loader').style.display = 'block';

    try {
        const profile = await liff.getProfile();
        const name = encodeURIComponent(profile.displayName);
        
        // สร้าง URL สำหรับส่งข้อมูล
        const fetchUrl = `${URL_GAS}?action=submitReview&row=${row}&score=${score}&name=${name}`;

        // ใช้ fetch แทนการสร้าง Script Tag
        const response = await fetch(fetchUrl, {
            method: "GET", // หรือ POST ตามที่คุณตั้งค่าใน GAS
            mode: "cors",  // บังคับโหมดข้ามโดเมน
            redirect: "follow" // *** หัวใจสำคัญ: ให้ตามการ Redirect ของ Google ***
        });

        const data = await response.text(); // หรือ res.json() ถ้า GAS ตอบกลับเป็น JSON

        if (data.includes("OK")) {
            alert("🌟 ขอบคุณสำหรับคะแนน " + score + " ดาวครับ");
            liff.closeWindow();
        } else {
            alert("แจ้งเตือนจากระบบ: " + data);
            document.getElementById('submitBtn').disabled = false;
        }
    } catch (error) {
        console.error("Fetch Error:", error);
        alert("ไม่สามารถติดต่อเซิร์ฟเวอร์ได้ (Network Error)");
    } finally {
        document.getElementById('loader').style.display = 'none';
    }
}
    // เริ่มทำงานเมื่อโหลดหน้า
    window.onload = init;
</script>

</body>
</html>
